<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bichinho Virtual</title>
    <link rel="stylesheet" href="./src/styles/style.css">

    <!-- Importando DaisyUI e TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-pink-50 min-h-screen flex flex-col relative">

    <!-- Cabeçalho com Avatar e Input -->
    <div class="w-full flex items-center justify-start p-4 gap-4">
        <div class="avatar">
            <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                <img src="./src/img/feliz.png" alt="Avatar da criatura" />
            </div>
        </div>
        <input type="text" placeholder="Nome da criatura..." class="input input-secondary" />
    </div>

    <!-- Cenário e Criatura Centralizada -->
    <div class="flex flex-col items-center w-full px-4 mt-10">
        <img id="mainImage" src="./src/img/normal.png" alt="Imagem principal"
            class="w-full max-w-md h-auto transition-transform hover:scale-105" />

        <div class="mt-12 flex justify-center w-full">
            <img id="btnImage" src="./src/img/cookie.png" alt="Botão de Alimentar"
                class="w-1/3 max-w-[180px] h-auto active:scale-95 transition cursor-pointer" onclick="alimentar()" />
        </div>
    </div>

    <!-- PONTO EXTRA: Botão escondido Ferlini (Gostosinho) -->
    <!-- Ele fica invisível no canto inferior direito, mas responde a clique -->
    <button class="fixed bottom-0 right-0 w-4 h-4 opacity-0 overflow-hidden cursor-default"
        onclick="alert('Você encontrou o Ferlini Gostosinho!')">
        <img src="./src/img/ferlini.png" alt="Ferlini Gostosinho" />
    </button>

    <!-- Script principal -->
    <script src="./src/scripts/script.js"></script>
</body>

</html>
