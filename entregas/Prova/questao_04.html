<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
        }

        .bg-copa {
            background-image: url('img/FIFA-World-Cup-26.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .card {
            backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <div class="bg-copa">
        <div class="d-flex flex-collum justify-content-center">
            <div id="Cards" class="d-flex flex-row align-items-center">
                <div class="card" style="width: 22rem;" aria-hidden="true">
                    <img src="./img/_vinicius_junior.png" class="card-img-top" alt="Placeholder Copa">

                    <div class="card-body">
                        <h5 id="Nome" class="card-title">
                            <span class="card-title">Vini JR.</span>
                            <span id="Rank" class="badge text-bg-secondary">9,5</span>
                        </h5>
                        <p class="card-text">
                            <span id="Data_Nas"><strong>Nascimento:</strong> 12/07/2000 </span><br>
                            <span id="Alutra"><strong>Altura:</strong> 1,76 </span><br>
                            <span id="Posição "><strong>Posição:</strong> Ponta-esquerda / Atacante</span><br>
                        </p>
                    </div>
                </div>



            </div>

        </div>
        <a href="#" onclick="add()" tabindex="-1" class="btn btn-primary" style="margin: 10px; padding: 10px;">
            Adcionar Novo Jogador
        </a>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
