<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respostas da Prova | Front-end</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f1a0e;
            --card: #1c2b1b;
            --border: #2e4a2c;
            --accent: #83c480;
            --text: #e8f5e6;
            --text-muted: #a0bfa0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .question-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .question-header {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            margin-bottom: 24px;
            border-left: 3px solid var(--accent);
            padding-left: 12px;
        }

        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        li {
            width: 100%;
        }

        li a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text);
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Space Mono', monospace;
            font-weight: 500;
        }

        li a:hover {
            background: rgba(131, 196, 128, 0.1);
            border-color: var(--accent);
            transform: translateX(8px);
            color: var(--accent);
        }

        li a::after {
            content: '→';
            font-size: 18px;
            opacity: 0.5;
            transition: transform 0.25s;
        }

        li a:hover::after {
            opacity: 1;
            transform: translateX(4px);
        }

        .footer-note {
            margin-top: 24px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }
    </style>
</head>

<body>

    <section class="question-card">
        <span class="question-header">Respostas da Prova</span>
        <ul>
            <li><a href="./questao_01.html">Questão 01</a></li>
            <li><a href="./questao_02.html">Questão 02</a></li>
            <li><a href="./questao_03.html">Questão 03</a></li>
            <li><a href="./questao_04.html">Questão 04</a></li>
        </ul>
    </section>

</body>

</html>
