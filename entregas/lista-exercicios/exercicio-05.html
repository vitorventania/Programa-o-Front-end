<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 05 - Convidados VIP</title>
    <style>
        :root {
            --bg: #0f1115;
            --panel: #171a21;
            --text: #e6e6e6;
            --muted: #a6adbb;
            --accent: #ba68c8;
            --border: #232734;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(1100px 520px at 15% -10%, #2a1f35, #0f1115);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            max-width: 720px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 10px 0;
            color: var(--accent);
        }

        p {
            margin: 0 0 16px 0;
            color: var(--muted);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0f141f;
            color: var(--text);
        }

        input:focus {
            outline: 2px solid var(--accent);
            border-color: transparent;
        }

        button {
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #0b0c10;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #ce93d8;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 18px 0 0 0;
            border-top: 1px solid var(--border);
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .nome {
            flex: 1;
        }

        .concluido {
            text-decoration: line-through;
            color: var(--muted);
        }

        .acoes button {
            margin-left: 6px;
            background: #263238;
            color: var(--text);
            border: 1px solid var(--border);
            font-weight: 600;
        }

        .acoes button:hover {
            background: #37474f;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .card {
                padding: 18px;
            }

            .row {
                flex-direction: column;
            }

            li {
                flex-direction: column;
                align-items: flex-start;
            }

            .acoes {
                width: 100%;
            }

            .acoes button {
                width: 100%;
                margin: 6px 0 0 0;
            }
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Infinity Bank - Lista de Convidados VIP</h1>
        <p>Adicione, conclua, edite ou exclua convidados sem recarregar a pagina.</p>

        <div class="row">
            <input id="nome" type="text" placeholder="Nome do convidado" />
            <button id="btn-adicionar">Adicionar</button>
        </div>

        <ul id="lista"></ul>
    </main>

    <script>
        const inputNome = document.getElementById("nome");
        const btnAdicionar = document.getElementById("btn-adicionar");
        const lista = document.getElementById("lista");

        function criarBotao(texto, onClick) {
            const btn = document.createElement("button");
            btn.textContent = texto;
            btn.addEventListener("click", onClick);
            return btn;
        }

        function adicionarConvidado(nome) {
            const li = document.createElement("li");
            const span = document.createElement("span");
            const acoes = document.createElement("div");

            span.className = "nome";
            span.textContent = nome;
            acoes.className = "acoes";

            const btnConcluir = criarBotao("Concluir", () => {
                // Alterna a classe para riscar o nome
                span.classList.toggle("concluido");
            });

            const btnEditar = criarBotao("Editar", () => {
                const novoNome = prompt("Novo nome:", span.textContent);
                if (novoNome && novoNome.trim() !== "") {
                    span.textContent = novoNome.trim();
                }
            });

            const btnExcluir = criarBotao("Excluir", () => {
                li.remove();
            });

            acoes.append(btnConcluir, btnEditar, btnExcluir);
            li.append(span, acoes);
            lista.appendChild(li);
        }

        btnAdicionar.addEventListener("click", () => {
            const nome = inputNome.value.trim();
            if (nome === "") return;
            adicionarConvidado(nome);
            inputNome.value = "";
            inputNome.focus();
        });
    </script>
</body>

</html>
