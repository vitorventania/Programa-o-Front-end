<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 01 - Validador de CPF</title>
    <style>
        :root {
            --bg: #0f1115;
            --panel: #171a21;
            --text: #e6e6e6;
            --muted: #a6adbb;
            --accent: #ffb74d;
            --border: #232734;
            --ok: #4caf50;
            --err: #ef5350;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(900px 500px at 15% -10%, #1d2230, #0f1115);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 10px 0;
            color: var(--accent);
        }

        p {
            color: var(--muted);
        }

        label {
            display: block;
            margin: 18px 0 8px 0;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0f141f;
            color: var(--text);
        }

        input:focus {
            outline: 2px solid var(--accent);
            border-color: transparent;
        }

        button {
            margin-top: 14px;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #0b0c10;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #ffcc80;
        }

        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #121621;
            font-weight: 600;
        }

        .ok {
            color: var(--ok);
        }

        .err {
            color: var(--err);
        }

        .hint {
            margin-top: 12px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .container {
                padding: 18px;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>Exercicio 01 - Validador de CPF</h1>
        <p>Digite o CPF e clique em validar. Aceita com ou sem pontuacao.</p>

        <label for="cpf">CPF</label>
        <input id="cpf" type="text" placeholder="000.000.000-00" />
        <button id="btn-validar">Validar</button>

        <div id="resultado" class="result">Aguardando validacao...</div>
        <div class="hint">Use somente numeros. Digitos iguais sao invalidos.</div>
    </main>

    <script>
        const inputCpf = document.getElementById("cpf");
        const btnValidar = document.getElementById("btn-validar");
        const resultado = document.getElementById("resultado");

        function limparCpf(valor) {
            // Remove tudo que nao for numero
            return valor.replace(/\D/g, "");
        }

        function todosDigitosIguais(cpf) {
            return /^([0-9])\1{10}$/.test(cpf);
        }

        function calcularDigito(cpf, pesoInicial) {
            let soma = 0;
            for (let i = 0; i < cpf.length; i += 1) {
                soma += Number(cpf[i]) * (pesoInicial - i);
            }
            let resto = (soma * 10) % 11;
            if (resto === 10) return 0;
            return resto;
        }

        function validarCpf(cpf) {
            if (cpf.length !== 11) return false;
            if (todosDigitosIguais(cpf)) return false;

            const baseNove = cpf.slice(0, 9);
            const digito1 = calcularDigito(baseNove, 10);
            const baseDez = cpf.slice(0, 10);
            const digito2 = calcularDigito(baseDez, 11);

            return digito1 === Number(cpf[9]) && digito2 === Number(cpf[10]);
        }

        btnValidar.addEventListener("click", () => {
            const cpfLimpo = limparCpf(inputCpf.value);
            const valido = validarCpf(cpfLimpo);

            if (valido) {
                resultado.textContent = "CPF valido.";
                resultado.classList.remove("err");
                resultado.classList.add("ok");
            } else {
                resultado.textContent = "CPF invalido.";
                resultado.classList.remove("ok");
                resultado.classList.add("err");
            }
        });
    </script>
</body>

</html>
