<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 02 - Conversor Dinamico</title>
    <style>
        :root {
            --bg: #0f1115;
            --panel: #171a21;
            --text: #e6e6e6;
            --muted: #a6adbb;
            --accent: #4dd0e1;
            --border: #232734;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(1000px 520px at 85% -10%, #1e2734, #0f1115);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 8px 0;
            color: var(--accent);
        }

        p {
            margin: 0 0 16px 0;
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0f141f;
            color: var(--text);
        }

        input:focus {
            outline: 2px solid var(--accent);
            border-color: transparent;
        }

        .note {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .container {
                padding: 18px;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>Exercicio 02 - Conversor Dinamico</h1>
        <p>Digite em qualquer campo e o outro sera atualizado automaticamente.</p>

        <div class="grid">
            <div>
                <label for="celsius">Celsius (C)</label>
                <input id="celsius" type="number" step="0.1" placeholder="0" />
            </div>
            <div>
                <label for="fahrenheit">Fahrenheit (F)</label>
                <input id="fahrenheit" type="number" step="0.1" placeholder="32" />
            </div>
        </div>

        <div class="note">Resultados com 2 casas decimais.</div>
    </main>

    <script>
        const inputC = document.getElementById("celsius");
        const inputF = document.getElementById("fahrenheit");
        let atualizando = false;

        function celsiusParaF(c) {
            return (c * 9 / 5) + 32;
        }

        function fahrenheitParaC(f) {
            return (f - 32) * 5 / 9;
        }

        inputC.addEventListener("input", () => {
            if (atualizando) return;
            atualizando = true;

            const valor = Number(inputC.value);
            if (inputC.value === "") {
                inputF.value = "";
            } else {
                const convertido = celsiusParaF(valor);
                inputF.value = convertido.toFixed(2);
            }

            atualizando = false;
        });

        inputF.addEventListener("input", () => {
            if (atualizando) return;
            atualizando = true;

            const valor = Number(inputF.value);
            if (inputF.value === "") {
                inputC.value = "";
            } else {
                const convertido = fahrenheitParaC(valor);
                inputC.value = convertido.toFixed(2);
            }

            atualizando = false;
        });
    </script>
</body>

</html>
